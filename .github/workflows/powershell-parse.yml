name: PowerShell syntax
on:
  push:
    paths: ['**/*.ps1', '.github/workflows/powershell-parse.yml']
  pull_request:
    paths: ['**/*.ps1']
jobs:
  parse:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Parse PowerShell scripts
        shell: pwsh
        run: |
          $failed = $false
          Get-ChildItem -Recurse -Filter *.ps1 | ForEach-Object {
            $tokens = $null; $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile($_.FullName,[ref]$tokens,[ref]$errors) | Out-Null
            if ($errors.Count) { $failed = $true; $errors | ForEach-Object { Write-Error "$($_.Extent.File):$($_.Extent.StartLineNumber) $($_.Message)" } }
          }
          if ($failed) { exit 1 }
