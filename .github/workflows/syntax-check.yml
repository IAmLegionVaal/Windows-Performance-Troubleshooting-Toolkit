name: PowerShell syntax
on:
  push:
    paths: ['**/*.ps1']
  pull_request:
    paths: ['**/*.ps1']
jobs:
  syntax:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - shell: pwsh
        run: |
          $bad=$false
          Get-ChildItem -Recurse -Filter *.ps1 | ForEach-Object {$t=$null;$e=$null;[void][System.Management.Automation.Language.Parser]::ParseFile($_.FullName,[ref]$t,[ref]$e);if($e){$bad=$true}}
          if($bad){exit 1}
